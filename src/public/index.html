<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Door OTP</title>
  <style>
    /* Color theme: dark background, bright accents */
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    #otpBox {
      font-size: 3rem;
      padding: 20px 40px;
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    button {
      font-size: 1.2rem;
      padding: 10px 20px;
      background: #ff6b6b;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4757;
    }
  </style>
</head>
<body>

  <h1>Smart Door OTP</h1>
  <div id="otpBox">----</div>
  <button onclick="fetchOTP()">Request OTP</button>

  <script>
    async function fetchOTP() {
      try {
        const response = await fetch('https://smart-door-lock-flame.vercel.app/generate-otp');
        const data = await response.json();
        document.getElementById('otpBox').textContent = data.otp;
        console.log('OTP:', data.otp);
      } catch (error) {
        console.error('Error fetching OTP:', error);
        document.getElementById('otpBox').textContent = 'Error!';
      }
    }
  </script>
</body>
</html>
